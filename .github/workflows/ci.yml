name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install
        working-directory: ui

      - name: Typecheck & build frontend
        run: pnpm run build
        working-directory: ui

      - name: Copy dist for embed
        run: |
          rm -rf pkg/ui/dist
          cp -r ui/dist pkg/ui/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build -o /dev/null .

      - name: Go test
        run: go test ./...
